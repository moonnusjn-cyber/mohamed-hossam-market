<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>محمد حسام ماركت</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --accent-color: #e74c3c;
            --whatsapp-color: #25d366;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            direction: rtl;
            padding-bottom: 70px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin-bottom: 5px;
        }

        .contact-info {
            font-size: 14px;
            color: #bdc3c7;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-box {
            padding: 10px 15px;
            width: 100%;
            max-width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 16px;
        }

        .admin-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .admin-btn:hover {
            background-color: #c0392b;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .product-category {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 8px;
            background-color: #f1f2f6;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-price {
            font-size: 16px;
            color: var(--secondary-color);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .card-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .add-to-cart {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .buy-now-btn {
            background-color: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .modal-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .close-modal {
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
            align-self: flex-start;
            line-height: 1;
        }

        .close-modal:hover {
            color: #000;
        }

        .cart-items-list {
            text-align: right;
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .cart-total-price {
            font-size: 18px;
            font-weight: bold;
            color: var(--secondary-color);
            margin: 10px 0;
        }

        .whatsapp-send-btn {
            background-color: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }

        .cart-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: var(--whatsapp-color);
            color: white;
            padding: 12px 22px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-weight: bold;
            font-size: 16px;
            z-index: 99;
        }
    </style>
</head>

        let cart = [];

        function displayProducts(items) {
            const grid = document.getElementById("productsGrid");
            if (!grid) return;
            grid.innerHTML = "";
            items.forEach(product => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div>
                            <div class="product-category">${product.category}</div>
                            <div class="product-name">${product.name}</div>
                        </div>
                        <div>
                            <div class="product-price">${product.price.toFixed(2)} جنيه</div>
                            <div class="card-buttons">
                                <button class="add-to-cart" onclick="addToCart(${product.id})">إضافة للسلة</button>
                                <button class="buy-now-btn" onclick="buyNow(${product.id})">شراء سريع (واتساب)</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function searchProducts() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
            displayProducts(filtered);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById("cartCount").innerText = cart.length;
        }

        function buyNow(id) {
            const product = products.find(p => p.id === id);
            let message = `مرحباً، أريد شراء هذا المنتج من محمد حسام ماركت:\n\n- ${product.name}\n- السعر: ${product.price.toFixed(2)} جنيه`;
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/201224597348?text=${encodedMessage}`, '_blank');
        }

        function openCartModal() {
            if (cart.length === 0) {
                alert("السلة فارغة! برجاء إضافة منتجات أولاً.");
                return;
            }

            const listContainer = document.getElementById("cartItemsList");
            listContainer.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                listContainer.innerHTML += `
                    <div class="cart-item-row">
                        <span>${index + 1}. ${item.name}</span>
                        <span><b>${item.price.toFixed(2)} جنيه</b></span>
                    </div>
                `;
            });

            document.getElementById("cartTotalPrice").innerText = total.toFixed(2);
            document.getElementById("cartModal").style.display = "flex";
        }

        function closeCartModal() {
            document.getElementById("cartModal").style.display = "none";
        }

        function sendCartToWhatsApp() {
            if (cart.length === 0) return;

            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let message = "مرحباً، أريد طلب المنتجات الآتية من محمد حسام ماركت:\n\n";
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - ${item.price.toFixed(2)} جنيه\n`;
            });
            message += `\nالإجمالي الكلي: ${total.toFixed(2)} جنيه`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/201224597348?text=${encodedMessage}`, '_blank');
            closeCartModal();
        }

        function openAdminModal() {
            document.getElementById("adminModal").style.display = "flex";
        }

        function closeAdminModal() {
            document.getElementById("adminModal").style.display = "none";
            document.getElementById("safePin").value = "";
            document.getElementById("safeResult").innerText = "";
        }

        function checkSafe() {
            const pin = document.getElementById("safePin").value;
            const resultDiv = document.getElementById("safeResult");
            if (pin === "123321") {

            } else {
                resultDiv.style.color = "red";
                resultDiv.innerText = "كود الخزنة غير صحيح!";
            }
        }
